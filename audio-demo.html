<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Audio Interview Demo</title>
  <style>
    body {
      background: #0b0d12;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
      padding: 30px;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
      margin-top: 10px;
    }
    .primary { background: #4f46e5; color: white; }
    .danger { background: #b91c1c; color: white; }
    audio { margin-top: 20px; width: 100%; }
    textarea {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      background: #11141b;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: white;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>Audio Interview Demo</h1>
<p>This demo records your answer, stores it, plays it back, and generates a summary + recommended improvements.</p>

<button id="recordBtn" class="primary">Start Recording</button>
<button id="stopBtn" class="danger" disabled>Stop Recording</button>

<audio id="audioPlayback" controls></audio>

<textarea id="summaryBox" placeholder="Summary will appear here..."></textarea>

<script>
  let mediaRecorder;
  let audioChunks = [];

  const recordBtn = document.getElementById("recordBtn");
  const stopBtn = document.getElementById("stopBtn");
  const audioPlayback = document.getElementById("audioPlayback");
  const summaryBox = document.getElementById("summaryBox");

  recordBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, { type: "audio/mp3" });
      const audioUrl = URL.createObjectURL(audioBlob);
      audioPlayback.src = audioUrl;

      generateSummary();
    };

    mediaRecorder.start();
    recordBtn.disabled = true;
    stopBtn.disabled = false;
    recordBtn.textContent = "Recording...";
  };

  stopBtn.onclick = () => {
    mediaRecorder.stop();
    recordBtn.disabled = false;
    stopBtn.disabled = true;
    recordBtn.textContent = "Start Recording";
  };

  function generateSummary() {
    summaryBox.value =
      "Summary of your answer:\n" +
      "- You spoke clearly and stayed on topic.\n" +
      "- You provided relevant experience.\n" +
      "- You could strengthen your answer by adding a specific example.\n\n" +
      "Recommended improvements:\n" +
      "- Add a measurable result (e.g., 'increased sales by 20%').\n" +
      "- Use the STAR method (Situation, Task, Action, Result).\n" +
      "- Keep your answer under 90 seconds.\n";
  }
</script>

</body>
</html>
