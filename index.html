<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exit Interview</title>
  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 18px;
      margin: 5px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }
    #video {
      margin-top: 20px;
      width: 480px;
      height: 360px;
      background: #000;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Start Your Exit Interview</h1>

  <button id="startBtn" onclick="startInterview()">Start Interview</button>
  <button id="endBtn" onclick="endInterview()" disabled>End Interview</button>

  <div>
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div id="status">Idle</div>

  <script>
    const LivekitClient = window.LivekitClient;

    // ⭐ Your REAL LiveKit WebSocket URL
    const LIVEKIT_URL = "wss://exit-interview-agent-1lo01a7d.livekit.cloud";

    // ⭐ Your REAL participant token
    const PARTICIPANT_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3Nzg0Nzk1MjEsImlkZW50aXR5IjoiU3R1ZGVudCIsImlzcyI6IkFQSWZ5aHdrTGhKSEtqWCIsIm5iZiI6MTc3ODQ3NTkyMSwic3ViIjoiU3R1ZGVudCIsInZpZGVvIjp7ImNhblB1Ymxpc2giOnRydWUsImNhblB1Ymxpc2hEYXRhIjp0cnVlLCJjYW5TdWJzY3JpYmUiOnRydWUsInJvb20iOiJleGl0LWludGVydmlldyIsInJvb21Kb2luIjp0cnVlfX0.sSNRWMxPQ9A6QDIgyC3zmkslR5l4GCYQf489BLiEDO8";

    // ⭐ Your REAL dispatch endpoint
    const DISPATCH_URL = "https://exit-interview-agent-1lo01a7d.livekit.cloud/agents/dispatch";

    let room = null;
    let localTrack = null;

    async function startInterview() {
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const endBtn = document.getElementById("endBtn");

      startBtn.disabled = true;
      statusEl.innerText = "Connecting to LiveKit...";

      try {
        // 1) Connect to room
        room = new LivekitClient.Room();
        await room.connect(LIVEKIT_URL, PARTICIPANT_TOKEN);
        statusEl.innerText = "Connected to room";

        // 2) Publish local camera + mic
        const videoEl = document.getElementById("video");
        const localTracks = await LivekitClient.createLocalTracks({
          video: true,
          audio: true,
        });
        localTrack = localTracks;

        for (const track of localTracks) {
          await room.localParticipant.publishTrack(track);
          if (track.kind === "video") {
            const mediaStream = new MediaStream([track.mediaStreamTrack]);
            videoEl.srcObject = mediaStream;
          }
        }

        // 3) Listen for agent audio
        room
          .on(LivekitClient.RoomEvent.ParticipantConnected, (p) => {
            console.log("Participant joined:", p.identity);
          })
          .on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
            if (track.kind === "audio") {
              const audio = document.createElement("audio");
              audio.autoplay = true;
              audio.srcObject = new MediaStream([track.mediaStreamTrack]);
              document.body.appendChild(audio);
              console.log("Agent audio subscribed from:", participant.identity);
            }
          })
          .on(LivekitClient.RoomEvent.ConnectionStateChanged, (state) => {
            console.log("Connection state:", state);
            if (state === "disconnected") {
              statusEl.innerText = "Disconnected";
              startBtn.disabled = false;
              endBtn.disabled = true;
            }
          });

        // 4) Dispatch the agent into the room
        statusEl.innerText = "Dispatching agent...";
        await fetch(DISPATCH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            agentName: "Interview_Agent",
            identity: "exit-agent",
            roomName: "exit-interview",
          }),
        });

        statusEl.innerText = "Agent joining and starting interview...";
        endBtn.disabled = false;

      } catch (err) {
        console.error(err);
        statusEl.innerText = "Error: " + (err.message || err);
        startBtn.disabled = false;
        endBtn.disabled = true;
      }
    }

    async function endInterview() {
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const endBtn = document.getElementById("endBtn");

      try {
        if (room) {
          await room.disconnect();
          room = null;
        }
        if (localTrack) {
          for (const t of localTrack) {
            t.stop();
          }
          localTrack = null;
        }
        statusEl.innerText = "Interview ended.";
      } catch (err) {
        console.error(err);
        statusEl.innerText = "Error ending interview.";
      } finally {
        startBtn.disabled = false;
        endBtn.disabled = true;
      }
    }
  </script>
</body>
</html>
