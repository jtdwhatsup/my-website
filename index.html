<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Interviewer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0f12;
      font-family: Arial, sans-serif;
      color: #E5E9F0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #videoContainer {
      margin-top: 20px;
    }

    video {
      width: 700px;
      border-radius: 10px;
      border: 2px solid #222;
    }

    #transcriptBox {
      width: 700px;
      height: 250px;
      background: #111418;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.5;
      border: 1px solid #222;
      white-space: pre-wrap;
    }

    #resumeInput {
      width: 700px;
      height: 150px;
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1d21;
      color: #E5E9F0;
      resize: none;
      font-size: 14px;
    }

    #controls {
      margin-top: 20px;
      display: flex;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: #3a82f7;
      color: white;
    }

    button:hover {
      background: #1f6ae0;
    }
  </style>
</head>
