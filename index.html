<!DOCTYPE html>
<html>
<head>
  <title>AI Mock Interview</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    #videoContainer {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    video {
      width: 45%;
      background: black;
      border-radius: 8px;
    }

    #lightWarning {
      color: red;
      font-weight: bold;
      margin-top: 10px;
      display: none;
    }

    #summaryBox {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>AI Mock Interview</h1>

  <label>Upload your resume:</label>
  <input type="file" id="resumeUpload" accept=".pdf,.doc,.docx" />
  <br><br>

  <div id="lightWarning">Your lighting is too dark. Try moving to a brighter area.</div>

  <div id="videoContainer">
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
  </div>

  <!-- ⭐ Permanent audio element (Edge requires this) -->
  <audio id="agentAudio" autoplay playsinline></audio>

  <button id="startBtn">Start Interview</button>
  <button id="endBtn" style="margin-left:10px;">End Interview</button>

  <div id="summaryBox"></div>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- TensorFlow + BlazeFace -->
