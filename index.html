<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exit Interview Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: #0b0d12;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
    }
    .app {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: #11141b;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
    }
    video {
      width: 100%;
      border-radius: 12px;
      background: black;
    }
    button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
    }
    button.primary {
      background: #4f46e5;
      color: white;
    }
    button.danger {
      background: #b91c1c;
      color: white;
    }
    textarea, input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 8px;
      color: white;
      margin-top: 6px;
    }
    .transcript-box {
      background: #0f1117;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 8px;
      height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="app">

  <div class="card">
    <h2>Exit Interview Agent</h2>
    <p>Room: <b>interview-room</b></p>

    <video id="localVideo" autoplay playsinline muted></video>

    <button id="startBtn" class="primary">Start interview</button>
    <button id="endBtn" class="danger" disabled>End interview</button>
    <button id="muteBtn" disabled>Mute mic</button>
    <button id="downloadPdfBtn" disabled>Download Summary</button>

    <p id="status">Status: Disconnected</p>
  </div>

  <div class="card">
    <h3>Live Transcript</h3>
    <div id="transcriptBox" class="transcript-box"></div>

    <h3>Your last phrase</h3>
    <input id="lastUtterance" readonly />

    <h3>Summary</h3>
    <textarea id="summaryBox" readonly>End the interview to generate summary.</textarea>
  </div>

</div>

<script type="module">
  // -----------------------------
  // CONFIG
  // -----------------------------
  const LIVEKIT_URL = "wss://exit-interview-agent-1lo01a7d.livekit.cloud";
  const LIVEKIT_API_KEY = "APIfyhwkLhJHKjX";
  const ROOM_NAME = "interview-room";
  const AGENT_ID = "ab_3j6898gfhdj";

  // -----------------------------
  // DOM
  // -----------------------------
  const startBtn = document.getElementById("startBtn");
  const endBtn = document.getElementById("endBtn");
  const muteBtn = document.getElementById("muteBtn");
  const downloadPdfBtn = document.getElementById("downloadPdfBtn");

  const localVideo = document.getElementById("localVideo");
  const transcriptBox = document.getElementById("transcriptBox");
  const lastUtteranceInput = document.getElementById("lastUtterance");
  const summaryBox = document.getElementById("summaryBox");
  const statusEl = document.getElementById("status");

  let room = null;
  let localTrackPub = null;
  let recognition = null;
  let transcriptLines = [];
  let isMuted = false;

  // -----------------------------
  // CAMERA AUTO-START
  // -----------------------------
  navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    .then(stream => {
      localVideo.srcObject = stream;
      localVideo.play();
    })
    .catch(err => console.error("Camera error:", err));

  // -----------------------------
  // TOKEN (manual)
  // -----------------------------
  async function fetchToken(identity) {
    return "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3Nzg3Nzc5NTYsImlkZW50aXR5IjoiU3R1ZGVudCIsImlzcyI6IkFQSWZ5aHdrTGhKSEtqWCIsIm5iZiI6MTc3ODY5MTU1Niwic3ViIjoiU3R1ZGVudCIsInZpZGVvIjp7ImNhblB1Ymxpc2giOnRydWUsImNhblB1Ymxpc2hEYXRhIjp0cnVlLCJjYW5TdWJzY3JpYmUiOnRydWUsInJvb20iOiJpbnRlcnZpZXctcm9vbSIsInJvb21Kb2luIjp0cnVlfX0.Ksoa3T3cz3MeGGNvz7xVVuRPN8Tc-gpX76sG6yQn3Uo";
  }

  // -----------------------------
  // SPEECH RECOGNITION
  // -----------------------------
  function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;

    const rec = new SR();
    rec.lang = "en-US";
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (event) => {
      let finalText = "";
      let interimText = "";

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        if (res.isFinal) finalText += res[0].transcript;
        else interimText += res[0].transcript;
      }

      if (interimText) lastUtteranceInput.value = interimText;
      if (finalText) {
        lastUtteranceInput.value = finalText;
        appendTranscript("You", finalText);
      }
    };

    return rec;
  }

  function appendTranscript(speaker, text) {
    const div = document.createElement("div");
    div.textContent = speaker + ": " + text;
    transcriptBox.appendChild(div);
    transcriptBox.scrollTop = transcriptBox.scrollHeight;
    transcriptLines.push({ speaker, text });
  }

  // -----------------------------
  // LIVEKIT CONNECTION
  // -----------------------------
  async function connectRoom() {
    const { Room, createLocalTracks } = await import("https://cdn.skypack.dev/livekit-client@1.16.4");

    const identity = "user-" + Math.floor(Math.random() * 100000);
    const token = await fetchToken(identity);

    room = new Room();
    await room.connect(LIVEKIT_URL, token);

    statusEl.textContent = "Status: Connected";

    const localTracks = await createLocalTracks({
      audio: true,
      video: { facingMode: "user" }
    });

    const videoTrack = localTracks.find(t => t.kind === "video");
    const audioTrack = localTracks.find(t => t.kind === "audio");

    if (videoTrack) {
      const el = videoTrack.attach();
      el.muted = true;
      localVideo.srcObject = el.srcObject;
      await room.localParticipant.publishTrack(videoTrack);
    }

    if (audioTrack) {
      localTrackPub = await room.localParticipant.publishTrack(audioTrack);
    }

    room.on("trackSubscribed", (track) => {
      if (track.kind === "audio") {
        const audioEl = track.attach();
        audioEl.play().catch(() => {});
      }
    });
  }

  function disconnectRoom() {
    if (room) room.disconnect();
    room = null;
    statusEl.textContent = "Status: Disconnected";
  }

  // -----------------------------
  // SUMMARY
  // -----------------------------
  function generateSummary() {
    if (!transcriptLines.length) {
      summaryBox.value = "No transcript captured.";
      return;
    }

    const total = transcriptLines.length;
    const you = transcriptLines.filter(l => l.speaker === "You").length;
    const ai = total - you;

    summaryBox.value =
      `Summary:\n\n` +
      `Total lines: ${total}\n` +
      `You: ${you}\n` +
      `Agent: ${ai}\n\n` +
      `First lines:\n` +
      transcriptLines.slice(0, 3).map(l => `${l.speaker}: ${l.text}`).join("\n") +
      `\n\nLast lines:\n` +
      transcriptLines.slice(-3).map(l => `${l.speaker}: ${l.text}`).join("\n");
  }

  function downloadSummary() {
    const content = summaryBox.value;
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "summary.txt";
    a.click();
    URL.revokeObjectURL(url);
  }

  // -----------------------------
  // BUTTONS
  // -----------------------------
  startBtn.onclick = async () => {
    startBtn.disabled = true;
    startBtn.textContent = "Connecting...";

    recognition = setupSpeechRecognition();
    if (recognition) recognition.start();

    await connectRoom();

    endBtn.disabled = false;
    muteBtn.disabled = false;
    startBtn.textContent = "Interview running";
  };

  endBtn.onclick = () => {
    if (recognition) recognition.stop();
    disconnectRoom();
    generateSummary();
    downloadPdfBtn.disabled = false;
  };

  muteBtn.onclick = () => {
    if (!localTrackPub) return;
    isMuted = !isMuted;
    localTrackPub.track.muted = isMuted;
    muteBtn.textContent = isMuted ? "Unmute mic" : "Mute mic";
  };

  downloadPdfBtn.onclick = downloadSummary;
</script>

</body>
</html>
